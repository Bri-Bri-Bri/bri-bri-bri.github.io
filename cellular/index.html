<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Cellular — Chess Notebook</title>
  <!-- shared navbar: prevents theme flash + injects site nav -->
  <script src="../shared/navbar.js"></script>
  <link rel="stylesheet" href="https://unpkg.com/@lichess-org/pgn-viewer@2.6.0/dist/lichess-pgn-viewer.css">
  <link rel="stylesheet" href="editor.css">
</head>
<body>

  <header id="menubar">
    <button id="sidebarToggle" class="btn-icon" title="Toggle diary sidebar">☰</button>
    <span class="logo">♟ Cellular</span>
    <div class="menu-section">
      <button id="addTextBtn" class="btn btn-ghost">+ Text</button>
      <button id="addBoardBtn" class="btn btn-ghost">+ Board</button>
    </div>
    <div class="spacer"></div>
    <div class="menu-section">
      <button id="newEntryBtn" class="btn btn-secondary">+ New Entry</button>
      <button id="exportBtn" class="btn btn-primary">Export Entry</button>
    </div>
  </header>

  <aside id="sidebar">
    <div id="sidebar-header">
      <span class="sidebar-label">Chess Diary</span>
      <button id="sidebarNewBtn" class="btn btn-primary">+ New</button>
    </div>
    <div id="sidebar-entries"></div>
    <div id="sidebar-footer">
      <button id="exportAllBtn" class="btn btn-ghost btn-sm" title="Export all diary entries as JSON">⬇ Export all</button>
      <label id="importLabel" class="btn btn-ghost btn-sm" title="Import diary entries from JSON">
        ⬆ Import
        <input type="file" id="importFile" accept=".json" style="display:none">
      </label>
    </div>
  </aside>

  <div id="notebook-area">

  <div id="title-wrap">
    <input id="notebookTitle" type="text" placeholder="Today's date…">
  </div>

  <main id="notebook"></main>

  <div id="empty-state">
    <div class="empty-icon">♟</div>
    <p>Start your diary entry by adding a cell.</p>
    <p class="empty-hint">
      <strong>+ Text</strong> for notes &nbsp;|&nbsp;
      <strong>+ Board</strong> for positions
    </p>
  </div>

  </div><!-- #notebook-area -->

  <script type="module" src="editor.js"></script>
</body>
</html>
