<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Cellular — Chess Diary</title>
  <!-- shared navbar: prevents theme flash + injects site nav -->
  <script src="../shared/navbar.js"></script>
  <link rel="stylesheet" href="https://unpkg.com/@lichess-org/pgn-viewer@2.6.0/dist/lichess-pgn-viewer.css">
  <link rel="stylesheet" href="board.css">
  <link rel="stylesheet" href="editor.css">
</head>
<body>

  <header id="menubar">
    <button id="sidebarToggle" class="btn-icon" title="Toggle diary sidebar">☰</button>
    <span class="logo">♟ Cellular</span>
    <button id="exportDiaryBtn" class="btn btn-primary" title="Export diary as standalone HTML">⬇ Export</button>
    <div class="spacer"></div>
    <div class="menu-section">
      <button id="addTextBtn" class="btn btn-ghost">+ Text</button>
      <button id="addBoardBtn" class="btn btn-ghost">+ Board</button>
      <button id="gamesBtn" class="btn btn-ghost" title="Import games from Lichess / Chess.com">📥 Games</button>
      <button id="puzzlesBtn" class="btn btn-ghost" title="View and practice saved puzzles">🧩 Puzzles</button>
    </div>
    <button id="settingsBtn" class="btn-icon" title="Settings">⚙</button>
  </header>

  <aside id="sidebar">
    <div id="sidebar-header">
      <span class="sidebar-label">Chess Diary</span>
      <button id="sidebarNewBtn" class="btn btn-primary">+ New</button>
    </div>
    <div id="sidebar-entries"></div>
    <div id="sidebar-footer">
      <button id="exportAllBtn" class="btn btn-ghost btn-sm" title="Export all diary entries as JSON">⬇ Export all</button>
      <label id="importLabel" class="btn btn-ghost btn-sm" title="Import diary entries from JSON">
        ⬆ Import
        <input type="file" id="importFile" accept=".json" style="display:none">
      </label>
    </div>
  </aside>

  <div id="notebook-area">

  <div id="title-wrap">
    <input id="notebookTitle" type="text" placeholder="Today's date…">
  </div>

  <main id="notebook"></main>

  <div id="empty-state">
    <div class="empty-icon">♟</div>
    <p>Start your diary entry by adding a cell.</p>
    <p class="empty-hint">
      <strong>+ Text</strong> for notes &nbsp;|&nbsp;
      <strong>+ Board</strong> for positions
    </p>
  </div>

  </div><!-- #notebook-area -->

  <!-- Settings modal -->
  <div id="settingsModal" class="modal-overlay" role="dialog" aria-modal="true" aria-label="Settings">
    <div class="modal-box">
      <div class="modal-header">
        <h3>Settings</h3>
        <button class="btn-icon" id="settingsClose" title="Close">✕</button>
      </div>
      <div class="modal-body">
        <div class="settings-field">
          <label for="settingsLichess">Lichess username</label>
          <input type="text" id="settingsLichess" placeholder="e.g. thibault" autocomplete="off" spellcheck="false">
        </div>
        <div class="settings-field">
          <label for="settingsChesscom">Chess.com username</label>
          <input type="text" id="settingsChesscom" placeholder="e.g. hikaru" autocomplete="off" spellcheck="false">
        </div>
        <div class="settings-field">
          <label for="settingsMaxGames">Max games to fetch per platform</label>
          <input type="number" id="settingsMaxGames" min="1" max="200" value="30">
        </div>
        <div class="settings-field">
          <label for="settingsBoardTheme">Board theme</label>
          <select id="settingsBoardTheme">
            <option value="auto">Auto (follows site theme)</option>
            <option value="brown">Brown — classic</option>
            <option value="blue">Blue</option>
            <option value="green">Green</option>
            <option value="purple">Purple</option>
          </select>
        </div>
      </div>
      <div class="modal-footer">
        <button class="btn btn-primary" id="settingsSave">Save</button>
      </div>
    </div>
  </div>

  <!-- Game picker modal -->
  <div id="gamesModal" class="modal-overlay" role="dialog" aria-modal="true" aria-label="Import games">
    <div class="modal-box modal-box--wide">
      <div class="modal-header">
        <h3>Import games</h3>
        <button class="btn-icon" id="gamesClose" title="Close">✕</button>
      </div>
      <div id="gamesModalBody" class="modal-body">
        <!-- populated by JS -->
      </div>
      <div class="modal-footer">
        <label class="modal-footer-option">
          <input type="checkbox" id="gamesNewestFirst" checked>
          Newest first
        </label>
        <button class="btn btn-primary" id="gamesAddBtn" disabled>Add to diary</button>
      </div>
    </div>
  </div>

  <!-- PGN editor modal -->
  <div id="pgnEditorModal" class="modal-overlay" role="dialog" aria-modal="true" aria-label="Edit PGN">
    <div class="modal-box">
      <div class="modal-header">
        <h3>Edit PGN</h3>
        <button class="btn-icon" id="pgnEditorClose" title="Close">✕</button>
      </div>
      <div class="modal-body">
        <textarea id="pgnEditorTextarea" class="pgn-editor-textarea" placeholder="Paste PGN or FEN here…" spellcheck="false"></textarea>
      </div>
      <div class="modal-footer">
        <button class="btn btn-secondary" id="pgnEditorClose2">Cancel</button>
        <button class="btn btn-primary" id="pgnEditorApply">Apply</button>
      </div>
    </div>
  </div>

  <!-- Save puzzle modal -->
  <div id="savePuzzleModal" class="modal-overlay" role="dialog" aria-modal="true" aria-label="Save puzzle">
    <div class="modal-box">
      <div class="modal-header">
        <h3>Save as Puzzle</h3>
        <button class="btn-icon" id="savePuzzleClose" title="Close">✕</button>
      </div>
      <div class="modal-body">
        <div class="settings-field">
          <label for="savePuzzleName">Puzzle name</label>
          <input type="text" id="savePuzzleName" placeholder="e.g. Brilliant queen sacrifice" autocomplete="off">
        </div>
        <p class="puzzle-save-hint">Saves from the current position. The remaining moves in the game become the solution.</p>
      </div>
      <div class="modal-footer">
        <button class="btn btn-secondary" id="savePuzzleCancel">Cancel</button>
        <button class="btn btn-primary" id="savePuzzleConfirm">Save</button>
      </div>
    </div>
  </div>

  <!-- Puzzles list modal -->
  <div id="puzzlesModal" class="modal-overlay" role="dialog" aria-modal="true" aria-label="Puzzles">
    <div class="modal-box modal-box--wide">
      <div class="modal-header">
        <h3>🧩 Puzzles</h3>
        <button class="btn-icon" id="puzzlesClose" title="Close">✕</button>
      </div>
      <div id="puzzlesModalBody" class="modal-body puzzle-list-body">
        <!-- populated by JS -->
      </div>
    </div>
  </div>

  <!-- Puzzle practice modal -->
  <div id="puzzlePracticeModal" class="modal-overlay" role="dialog" aria-modal="true" aria-label="Puzzle practice">
    <div class="modal-box modal-box--puzzle">
      <div class="modal-header">
        <h3 id="puzzlePracticeName">Puzzle</h3>
        <button class="btn-icon" id="puzzlePracticeClose" title="Close">✕</button>
      </div>
      <div class="modal-body puzzle-practice-body">
        <div class="puzzle-board-outer">
          <div id="puzzlePracticeBoard"></div>
        </div>
        <div class="puzzle-practice-controls">
          <div id="puzzleFeedback" class="puzzle-feedback"></div>
          <div class="puzzle-btn-row">
            <button class="btn btn-ghost" id="puzzleShowSolution">Show solution</button>
            <button class="btn btn-ghost" id="puzzleReset">↺ Reset</button>
          </div>
        </div>
      </div>
    </div>
  </div>

  <script type="module" src="editor.js"></script>
</body>
</html>
